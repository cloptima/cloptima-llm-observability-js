name: JS SDK CI

on:
  push:
    branches:
      - master
    paths-ignore:
      - '**/*.md'
      - '**/docker-compose*.yml'
      - '**/docker-compose*.yaml'
  pull_request:
    paths-ignore:
      - '**/*.md'
      - '**/docker-compose*.yml'
      - '**/docker-compose*.yaml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup npm
        run: npm install -g npm@11.6.2

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Run tests
        run: npm test
